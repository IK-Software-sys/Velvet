<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Fantasy Rummy</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        canvas#emberCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        /* --- UI OVERLAYS --- */
        .overlay-menu {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 20;
        }

        .panel {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px #fff;
            letter-spacing: 3px;
        }

        .souls-btn {
            background: rgba(40,40,40,0.6);
            border: 1px solid #555;
            color: #fff;
            padding: 12px 30px;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            margin: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .souls-btn:hover {
            border-color: #fff;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .souls-input {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            font-family: 'Cinzel';
            margin: 10px 0;
            text-align: center;
            width: 100%;
        }

        /* --- GAMEPLAY AREA --- */
        #game-area {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
        }

        #game-status {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.3rem;
            pointer-events: none;
            text-shadow: 0 0 10px #fff;
        }

        .hand {
            display: flex;
            height: 25vh;
            align-items: center;
            gap: -20px;
        }

        #player-hand-container {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border-top: 2px solid #222; /* The "Black Strip" */
            overflow-x: auto;
            padding: 15px 0;
        }

        #player-hand {
            display: flex;
            gap: 5px;
            padding-left: 20px;
        }

        /* Scrollbar Styling */
        #player-hand-container::-webkit-scrollbar { height: 8px; }
        #player-hand-container::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .card {
            width: 90px;
            aspect-ratio: 2.5/3.5;
            background-size: cover;
            border-radius: 5px;
            flex-shrink: 0;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 2px 2px 10px #000;
        }

        .card:hover { transform: translateY(-15px); }

        #table-center {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
        }

        .highlight { outline: 2px solid #fff; box-shadow: 0 0 15px #fff; }

        .rules-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            margin-bottom: 20px;
            font-family: sans-serif;
            text-align: left;
            font-size: 0.9rem;
            max-height: 250px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<canvas id="emberCanvas"></canvas>

<div id="main-menu" class="overlay-menu">
    <div id="home-panel" class="panel" style="display: flex;">
        <h1>Dark Rummy</h1>
        <button class="souls-btn" onclick="openPanel('tutorial-panel')">Rules</button>
        <button class="souls-btn" onclick="startOffline()">Solo Play</button>
        <button class="souls-btn" onclick="openPanel('multi-panel')">Online Battle</button>
    </div>

    <div id="tutorial-panel" class="panel">
        <h2>The Laws</h2>
        <div class="rules-box">
            <p>• <b>Objective:</b> Form Melds (3+ cards of same rank or 3+ sequence in same suit).</p><br>
            <p>• <b>Jokers:</b> (j.jpg) are wild and fit any meld.</p><br>
            <p>• <b>The Turn:</b> Draw from deck/discard, then discard one card.</p>
        </div>
        <button class="souls-btn" onclick="openPanel('home-panel')">Back</button>
    </div>

    <div id="multi-panel" class="panel">
        <h2>Multiplayer</h2>
        <p>Your ID:</p>
        <input type="text" id="my-id" class="souls-input" readonly value="Connecting...">
        <p>Friend's ID:</p>
        <input type="text" id="join-id" class="souls-input" placeholder="Paste ID here">
        <button class="souls-btn" onclick="connectToFriend()">Join Game</button>
        <button class="souls-btn" onclick="openPanel('home-panel')">Back</button>
    </div>
</div>

<div id="game-area">
    <div id="game-status">Loading...</div>
    
    <div id="music-controls" style="position:absolute; top:10px; right:10px; z-index:30;">
        <button class="souls-btn" style="padding:5px 10px; font-size:0.7rem;" onclick="skipTrack()">Skip Track</button>
    </div>

    <div class="hand" id="ai-hand" style="justify-content:center;"></div>

    <div id="table-center">
        <div class="card" id="draw-deck" style="background-image:url('back.png')"></div>
        <div class="card" id="discard-pile" style="background-image:url('back.png'); opacity:0;"></div>
    </div>

    <button class="souls-btn" style="margin: 0 auto; display: block;" onclick="organizeHand()">Organize Hand</button>

    <div id="player-hand-container">
        <div id="player-hand"></div>
    </div>
</div>

<script>
    // --- DATA ---
    const cards = [
        'sa.jpg','s2.jpg','s3.jpg','s4.jpg','s5.jpg','s6.jpg','s7.jpg','s8.jpg','s9.jpg','s10.jpg','sj.jpg','sq.jpg','sk.jpg',
        'ca.jpg','c2.png','c3.png','c4.png','c5.png','c6.png','c7.png','c8.png','c9.png','c10.png','cj.jpg','cq.jpg','ck.jpg',
        'ha.jpg','h2.jpg','h3.jpg','h4.jpg','h5.jpg','h6.jpg','h7.jpg','h8.jpg','h9.jpg','h10.jpg','hj.jpg','hq.jpg','hk.jpg',
        'da.jpg','d2.jpg','d3.jpg','d4.jpg','d5.jpg','d6.jpg','d7.jpg','d8.jpg','d9.jpg','d10.jpg','dj.jpg','dq.jpg','dk.jpg',
        'j.jpg', 'j.jpg'
    ];

    let playerHand = [];
    let deck = [];
    let discardPile = [];
    let gameState = 'IDLE';

    // --- AUDIO ---
    const tracks = ['menumusic.mp3', 'winter.mp3', 'summer.mp3'];
    let currentTrackIdx = 0;
    let bgm = new Audio();

    function playBGM(idx) {
        bgm.pause();
        bgm.src = tracks[idx];
        bgm.loop = true;
        bgm.play().catch(e => console.log("Waiting for user interaction"));
    }

    function skipTrack() {
        currentTrackIdx = (currentTrackIdx + 1) % tracks.length;
        playBGM(currentTrackIdx);
    }

    // --- NAVIGATION ---
    function openPanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    // --- GAME ENGINE ---
    function startOffline() {
        playBGM(0);
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'flex';
        
        deck = [...cards].sort(() => Math.random() - 0.5);
        playerHand = deck.splice(0, 10);
        discardPile.push(deck.pop());
        
        renderPlayerHand();
        updateDiscardUI();
        setGameState('PLAYER_DRAW');
    }

    function renderPlayerHand() {
        const container = document.getElementById('player-hand');
        container.innerHTML = '';
        playerHand.forEach(card => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.backgroundImage = `url('${card}')`;
            div.onclick = () => handleCardClick(card, div);
            container.appendChild(div);
        });
    }

    function updateDiscardUI() {
        const disc = document.getElementById('discard-pile');
        if(discardPile.length > 0) {
            disc.style.backgroundImage = `url('${discardPile[discardPile.length-1]}')`;
            disc.style.opacity = '1';
        }
    }

    function setGameState(s) {
        gameState = s;
        const status = document.getElementById('game-status');
        document.getElementById('draw-deck').classList.remove('highlight');
        document.getElementById('discard-pile').classList.remove('highlight');

        if(s === 'PLAYER_DRAW') {
            status.innerText = "Your Turn: Draw";
            document.getElementById('draw-deck').classList.add('highlight');
            document.getElementById('discard-pile').classList.add('highlight');
        } else if(s === 'PLAYER_DISCARD') {
            status.innerText = "Select a Card to Discard";
        }
    }

    // Interaction
    document.getElementById('draw-deck').onclick = () => {
        if(gameState !== 'PLAYER_DRAW') return;
        playerHand.push(deck.pop());
        renderPlayerHand();
        setGameState('PLAYER_DISCARD');
    };

    document.getElementById('discard-pile').onclick = () => {
        if(gameState !== 'PLAYER_DRAW' || discardPile.length === 0) return;
        playerHand.push(discardPile.pop());
        renderPlayerHand();
        updateDiscardUI();
        setGameState('PLAYER_DISCARD');
    };

    function handleCardClick(card, el) {
        if(gameState !== 'PLAYER_DISCARD') return;
        playerHand.splice(playerHand.indexOf(card), 1);
        discardPile.push(card);
        updateDiscardUI();
        renderPlayerHand();
        setGameState('PLAYER_DRAW'); // In solo, just loops back
    }

    function organizeHand() {
        playerHand.sort((a,b) => {
            if(a === 'j.jpg') return 1;
            if(b === 'j.jpg') return -1;
            return a.localeCompare(b);
        });
        renderPlayerHand();
    }

    // --- MULTIPLAYER ---
    const peer = new Peer();
    peer.on('open', id => document.getElementById('my-id').value = id);
    
    let conn;
    function connectToFriend() {
        const friendId = document.getElementById('join-id').value;
        conn = peer.connect(friendId);
        setupConn();
    }

    peer.on('connection', c => {
        conn = c;
        setupConn();
    });

    function setupConn() {
        conn.on('open', () => {
            alert("Connected!");
            startOffline(); // Simplification: triggers game view
        });
    }

    // --- CANVAS EMBERS ---
    const canvas = document.getElementById('emberCanvas');
    const ctx = canvas.getContext('2d');
    let embers = [];
    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for(let i=0; i<50; i++) embers.push({x: Math.random()*canvas.width, y: canvas.height, s: Math.random()*2, v: Math.random()*2});
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#ff5500";
        embers.forEach(e => {
            e.y -= e.v;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.s, 0, Math.PI*2); ctx.fill();
            if(e.y < 0) e.y = canvas.height;
        });
        requestAnimationFrame(draw);
    }
    initCanvas(); draw();
</script>
</body>
</html>
