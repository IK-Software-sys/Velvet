<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Fantasy Rummy</title>
    <style>
        /* --- DARK SOULS / SKYRIM THEME --- */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Embers Background */
        canvas#emberCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.8;
        }

        /* --- MENUS --- */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(20,20,20,0.9) 0%, rgba(0,0,0,1) 100%);
            z-index: 10;
            transition: opacity 1.5s ease-in-out;
        }

        #main-menu h1 {
            font-size: 3.5rem;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 5px rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .souls-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            padding: 15px 50px;
            font-size: 1.5rem;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }

        .souls-btn:hover {
            border: 1px solid #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
            background: rgba(255, 255, 255, 0.05);
        }

        .souls-btn:active {
            transform: scale(0.98);
        }

        /* --- GAME AREA --- */
        #game-area {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            position: relative;
        }

        #game-status {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            z-index: 2;
            pointer-events: none;
            opacity: 0.8;
        }

        .hand {
            display: flex;
            justify-content: center;
            height: 28vh;
            align-items: center;
            gap: -35px; /* Tighter overlap for bigger cards */
        }

        #table-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            height: 35vh;
        }

        /* Bigger, borderless cards */
        .card {
            width: 24vw; 
            max-width: 130px;
            height: auto;
            aspect-ratio: 2.5 / 3.5;
            border-radius: 6px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.9), 0 0 5px rgba(255,255,255,0.1);
            background-size: cover;
            background-position: center;
            background-image: url('back.png');
            transition: transform 0.3s, filter 0.3s;
            position: relative;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-15px);
            z-index: 10;
        }

        .highlight {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
            transform: scale(1.05);
        }

        /* Animations */
        .deal-anim { animation: dealCard 0.4s ease-out forwards; }
        .throw-anim { animation: throwCard 0.3s ease-in forwards; }

        @keyframes dealCard {
            from { transform: translateY(-50vh) scale(0.5); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes throwCard {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-20vh) scale(0.8); opacity: 0; filter: brightness(2); }
        }

        /* Music Manager UI */
        #music-manager {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 15px;
            z-index: 5;
        }

        .small-btn {
            padding: 8px 15px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <canvas id="emberCanvas"></canvas>

    <div id="main-menu">
        <h1>Victorian Rummy</h1>
        <button class="souls-btn" id="start-btn">Begin Journey</button>
    </div>

    <div id="game-area">
        <div id="music-manager">
            <button class="souls-btn small-btn" id="skip-song-btn">Skip Track</button>
        </div>

        <div id="game-status">Draw a card</div>

        <div class="hand" id="ai-hand"></div>

        <div id="table-center">
            <div class="card" id="draw-deck" style="background-image: url('back.png');"></div>
            <div class="card" id="discard-pile" style="background-image: url('back.png'); opacity: 0;"></div>
        </div>

        <div class="hand" id="player-hand"></div>
    </div>

    <script>
        const cardNames = [
            'sa.jpg','s2.jpg','s3.jpg','s4.jpg','s5.jpg','s6.jpg','s7.jpg','s8.jpg','s9.jpg','s10.jpg','sj.jpg','sq.jpg','sk.jpg',
            'ca.jpg','c2.png','c3.png','c4.png','c5.png','c6.png','c7.png','c8.png','c9.png','c10.png','cj.jpg','cq.jpg','ck.jpg',
            'ha.jpg','h2.jpg','h3.jpg','h4.jpg','h5.jpg','h6.jpg','h7.jpg','h8.jpg','h9.jpg','h10.jpg','hj.jpg','hq.jpg','hk.jpg',
            'da.jpg','d2.jpg','d3.jpg','d4.jpg','d5.jpg','d6.jpg','d7.jpg','d8.jpg','d9.jpg','d10.jpg','dj.jpg','dq.jpg','dk.jpg'
        ];

        // --- AUDIO MANAGER ---
        const sfxPlay = new Audio('play.mp3');
        sfxPlay.volume = 0.8;

        // Equalized Volume Settings
        const MASTER_VOLUME = 0.5;

        const menuMusic = new Audio('winter.mp3');
        menuMusic.loop = true;
        menuMusic.volume = MASTER_VOLUME;

        const track1 = new Audio('menumusic.mp3'); track1.volume = MASTER_VOLUME;
        const track2 = new Audio('winter.mp3');    track2.volume = MASTER_VOLUME;
        const track3 = new Audio('summer.mp3');    track3.volume = MASTER_VOLUME;
        
        const inGamePlaylist = [track1, track2, track3];
        let currentSongIndex = 0;

        track1.addEventListener('ended', playNextSong);
        track2.addEventListener('ended', playNextSong);
        track3.addEventListener('ended', playNextSong);

        function playNextSong() {
            // Stop current
            inGamePlaylist[currentSongIndex].pause();
            inGamePlaylist[currentSongIndex].currentTime = 0;
            // Move to next
            currentSongIndex = (currentSongIndex + 1) % inGamePlaylist.length;
            // Play next
            inGamePlaylist[currentSongIndex].play().catch(e => console.log(e));
        }

        document.getElementById('skip-song-btn').addEventListener('click', playNextSong);

        // Auto-play menu
        document.body.addEventListener('click', () => {
            if(document.getElementById('main-menu').style.display !== 'none' && menuMusic.paused) {
                menuMusic.play().catch(e => console.log(e));
            }
        }, {once: true});


        // --- RUMMY GAME STATE LOGIC ---
        let deck = [];
        let playerHand = [];
        let aiHand = [];
        let discardPile = [];
        
        // States: 'PLAYER_DRAW', 'PLAYER_DISCARD', 'AI_TURN'
        let gameState = 'PLAYER_DRAW'; 
        const statusEl = document.getElementById('game-status');

        document.getElementById('start-btn').addEventListener('click', () => {
            menuMusic.pause();
            menuMusic.currentTime = 0;
            inGamePlaylist[0].play().catch(e => console.log(e));

            const menu = document.getElementById('main-menu');
            menu.style.opacity = '0';
            setTimeout(() => {
                menu.style.display = 'none';
                document.getElementById('game-area').style.display = 'flex';
                initializeGame();
            }, 1500);
        });

        function initializeGame() {
            deck = [...cardNames].sort(() => Math.random() - 0.5);
            dealInitialCards();
        }

        function dealInitialCards() {
            const pHandEl = document.getElementById('player-hand');
            const aiHandEl = document.getElementById('ai-hand');
            pHandEl.innerHTML = ''; aiHandEl.innerHTML = '';
            playerHand = []; aiHand = [];

            for(let i = 0; i < 10; i++) {
                setTimeout(() => {
                    // AI Card
                    let aiCard = document.createElement('div');
                    aiCard.className = 'card deal-anim';
                    aiCard.style.marginLeft = '-40px';
                    aiHandEl.appendChild(aiCard);
                    aiHand.push('hidden'); // Placeholder for AI logic
                    sfxPlay.cloneNode().play();

                    // Player Card
                    let pCardStr = deck.pop();
                    playerHand.push(pCardStr);
                    let pCardEl = createPlayerCard(pCardStr);
                    pHandEl.appendChild(pCardEl);
                    sfxPlay.cloneNode().play();
                }, i * 200);
            }

            // Flip first discard
            setTimeout(() => {
                let firstDiscard = deck.pop();
                discardPile.push(firstDiscard);
                updateDiscardUI();
                setGameState('PLAYER_DRAW');
            }, 2200);
        }

        function createPlayerCard(cardName) {
            let el = document.createElement('div');
            el.className = 'card deal-anim';
            el.style.backgroundImage = `url('${cardName}')`;
            el.style.marginLeft = '-40px';
            el.dataset.card = cardName;
            
            el.addEventListener('click', function() {
                if(gameState !== 'PLAYER_DISCARD') return;
                
                // Discard logic
                playerHand = playerHand.filter(c => c !== cardName);
                discardPile.push(cardName);
                
                this.classList.add('throw-anim');
                sfxPlay.cloneNode().play();
                
                setTimeout(() => {
                    this.remove();
                    updateDiscardUI();
                    setGameState('AI_TURN');
                    setTimeout(aiTurn, 1000);
                }, 300);
            });
            return el;
        }

        function updateDiscardUI() {
            const discardEl = document.getElementById('discard-pile');
            if(discardPile.length > 0) {
                discardEl.style.backgroundImage = `url('${discardPile[discardPile.length - 1]}')`;
                discardEl.style.opacity = '1';
            } else {
                discardEl.style.opacity = '0';
            }
        }

        function setGameState(state) {
            gameState = state;
            const drawDeck = document.getElementById('draw-deck');
            const discardEl = document.getElementById('discard-pile');

            if(state === 'PLAYER_DRAW') {
                statusEl.innerText = "Draw from Deck or Discard";
                drawDeck.classList.add('highlight');
                if(discardPile.length > 0) discardEl.classList.add('highlight');
            } else if (state === 'PLAYER_DISCARD') {
                statusEl.innerText = "Discard a card";
                drawDeck.classList.remove('highlight');
                discardEl.classList.remove('highlight');
            } else {
                statusEl.innerText = "Opponent's Turn";
                drawDeck.classList.remove('highlight');
                discardEl.classList.remove('highlight');
            }
        }

        // --- DRAWING ACTIONS ---
        document.getElementById('draw-deck').addEventListener('click', () => {
            if(gameState !== 'PLAYER_DRAW' || deck.length === 0) return;
            sfxPlay.cloneNode().play();
            
            let drawnCard = deck.pop();
            playerHand.push(drawnCard);
            document.getElementById('player-hand').appendChild(createPlayerCard(drawnCard));
            
            setGameState('PLAYER_DISCARD');
        });

        document.getElementById('discard-pile').addEventListener('click', () => {
            if(gameState !== 'PLAYER_DRAW' || discardPile.length === 0) return;
            sfxPlay.cloneNode().play();
            
            let pickedCard = discardPile.pop();
            playerHand.push(pickedCard);
            document.getElementById('player-hand').appendChild(createPlayerCard(pickedCard));
            updateDiscardUI();

            setGameState('PLAYER_DISCARD');
        });

        // --- AI LOGIC (SKELETON) ---
        function aiTurn() {
            // 1. AI Draws (from deck for now)
            if(deck.length > 0) {
                deck.pop(); 
                sfxPlay.cloneNode().play();
                const aiHandEl = document.getElementById('ai-hand');
                let newAiCard = document.createElement('div');
                newAiCard.className = 'card deal-anim';
                newAiCard.style.marginLeft = '-40px';
                aiHandEl.appendChild(newAiCard);
                
                // 2. AI Discards
                setTimeout(() => {
                    if(aiHandEl.children.length > 0) {
                        let cardToThrow = aiHandEl.lastChild;
                        cardToThrow.classList.add('throw-anim');
                        sfxPlay.cloneNode().play();
                        
                        // Fake a discard card since AI doesn't know its hand yet
                        let randomDiscard = cardNames[Math.floor(Math.random() * cardNames.length)];
                        discardPile.push(randomDiscard);
                        
                        setTimeout(() => {
                            cardToThrow.remove();
                            updateDiscardUI();
                            setGameState('PLAYER_DRAW');
                        }, 300);
                    }
                }, 1000);
            }
        }

        // --- DARK SOULS EMBERS ---
        const canvas = document.getElementById('emberCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let embersArray = [];
        class Ember {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 3 + 0.5; // Smaller
                this.speedY = Math.random() * 1.5 + 0.5; // Slower
                this.speedX = Math.random() * 1 - 0.5;
                this.color = `rgba(255, ${Math.random() * 100 + 100}, 50, ${Math.random() * 0.8 + 0.2})`; // Orange/White
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                if (this.size > 0.05) this.size -= 0.01;
                if (this.y < 0 || this.size <= 0.05) {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + 50;
                    this.size = Math.random() * 3 + 0.5;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 5;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function initEmbers() {
            for (let i = 0; i < 80; i++) embersArray.push(new Ember());
        }
        initEmbers();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < embersArray.length; i++) {
                embersArray[i].update();
                embersArray[i].draw();
            }
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
